spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: admin
    password: ${DB_PASSWORD:supersecretpassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  autoconfigure:
    exclude: com.procureai.common.security.SecurityConfig

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:ProcureAI-JWT-Secret-Key-2026-That-Is-At-Least-256-Bits-Long!!}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

app:
  email-verification-enabled: false
