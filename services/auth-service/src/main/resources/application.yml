spring:
  application:
    name: auth-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:supersecretpassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
  autoconfigure:
    exclude: com.procureai.common.security.SecurityConfig
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:ProcureAI-JWT-Secret-Key-2026-That-Is-At-Least-256-Bits-Long!!}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

app:
  email-verification-enabled: false

service:
  gateway:
    url: ${SERVICE_GATEWAY_URL:http://localhost:8082}
  auth:
    url: ${SERVICE_AUTH_URL:http://localhost:8081}
  user:
    url: ${SERVICE_USER_URL:http://localhost:8090}
  procurement:
    url: ${SERVICE_PROCUREMENT_URL:http://localhost:8088}
  rfq:
    url: ${SERVICE_RFQ_URL:http://localhost:8083}
  quotation:
    url: ${SERVICE_QUOTATION_URL:http://localhost:8084}
  supplier:
    url: ${SERVICE_SUPPLIER_URL:http://localhost:8085}
  invoice:
    url: ${SERVICE_INVOICE_URL:http://localhost:8086}
  notification:
    url: ${SERVICE_NOTIFICATION_URL:http://localhost:8087}
  ocr:
    url: ${SERVICE_OCR_URL:http://localhost:8091}
  ai:
    url: ${SERVICE_AI_URL:http://localhost:8000}
