# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Fix: Hibernate 6.4+ uses "RETURNING id" by default on identity columns.
# Disable this behavior for H2 which does not support that syntax.
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true
spring.jpa.properties.hibernate.id.optimizer.pooled.prefer_lo=false

# Disable RabbitMQ for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# Disable PostgreSQL RLS aspect (SET LOCAL not supported by H2)
procureai.rls.enabled=false
