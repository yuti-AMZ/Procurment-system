spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://172.28.0.1:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-Requested-With
              - Accept
            allowCredentials: true
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - name: JwtAuthFilter

        - id: user-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/users/**, /api/departments/**
          filters:
            - name: JwtAuthFilter

        - id: procurement-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/procurement/**
          filters:
            - name: JwtAuthFilter

        - id: rfq-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/rfq/**
          filters:
            - name: JwtAuthFilter

        - id: quotation-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/quotation/**
          filters:
            - name: JwtAuthFilter

        - id: supplier-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/suppliers/**
          filters:
            - name: JwtAuthFilter

        - id: invoice-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/invoices/**
          filters:
            - name: JwtAuthFilter

        - id: notification-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: JwtAuthFilter

        - id: ocr-service
          uri: http://localhost:8091
          predicates:
            - Path=/api/ocr/**

        - id: ai-service
          uri: http://localhost:8000
          predicates:
            - Path=/api/ai/**
          filters:
            - name: JwtAuthFilter

server:
  port: 8082

jwt:
  secret: ${JWT_SECRET:ProcureAI-JWT-Secret-Key-2026-That-Is-At-Least-256-Bits-Long!!}
