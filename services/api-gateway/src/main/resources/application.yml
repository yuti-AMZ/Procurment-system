spring:
  application:
    name: api-gateway
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:3000"
              - "http://172.28.0.1:3000"
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-Requested-With
              - Accept
            allowCredentials: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://127.0.0.1:8081}
          predicates:
            - Path=/api/auth/**

        - id: admin-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/admin/**, /api/platform/admin/**
          filters:
            - name: JwtAuthFilter

        - id: tenant-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/tenant/**

        - id: api-keys-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/apikeys/**
          filters:
            - name: JwtAuthFilter

        - id: user-service
          uri: ${USER_SERVICE_URL:http://127.0.0.1:8090}
          predicates:
            - Path=/api/users/**, /api/departments/**
          filters:
            - name: JwtAuthFilter

        - id: rfq-service
          uri: ${RFQ_SERVICE_URL:http://127.0.0.1:8083}
          predicates:
            - Path=/api/rfq/**
          filters:
            - name: JwtAuthFilter

        - id: quotation-service
          uri: ${QUOTATION_SERVICE_URL:http://127.0.0.1:8084}
          predicates:
            - Path=/api/quotation/**
          filters:
            - name: JwtAuthFilter

        - id: supplier-service
          uri: ${SUPPLIER_SERVICE_URL:http://127.0.0.1:8085}
          predicates:
            - Path=/api/suppliers/**
          filters:
            - name: JwtAuthFilter

        - id: invoice-service
          uri: ${INVOICE_SERVICE_URL:http://127.0.0.1:8086}
          predicates:
            - Path=/api/invoices/**
          filters:
            - name: JwtAuthFilter

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://127.0.0.1:8087}
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: JwtAuthFilter

        - id: procurement-service
          uri: ${PROCUREMENT_SERVICE_URL:http://127.0.0.1:8088}
          predicates:
            - Path=/api/procurement/**
          filters:
            - name: JwtAuthFilter

        - id: ocr-service
          uri: ${OCR_SERVICE_URL:http://localhost:8091}
          predicates:
            - Path=/api/ocr/**

        - id: ai-service
          uri: ${AI_SERVICE_URL:http://localhost:8000}
          predicates:
            - Path=/api/ai/**
          filters:
            - name: JwtAuthFilter

server:
  port: 8082

jwt:
  secret: ${JWT_SECRET:ProcureAI-JWT-Secret-Key-2026-That-Is-At-Least-256-Bits-Long!!}
