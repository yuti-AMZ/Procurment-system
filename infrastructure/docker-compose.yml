services:
  # ============================================
  # INFRASTRUCTURE
  # ============================================

  postgres:
    image: postgres:15-alpine
    container_name: procureai-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supersecretpassword}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - procureai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: procureai-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
    networks:
      - procureai-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 15s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: procureai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - procureai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: procureai-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - procureai-network

  # ============================================
  # JAVA SERVICES
  # ============================================

  auth-service:
    build:
      context: ../services/auth-service
    container_name: procureai-auth
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: admin
      DB_PASSWORD: ${DB_PASSWORD:-supersecretpassword}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-ProcureAI-JWT-Secret-Key-2026-That-Is-At-Least-256-Bits-Long!!}
      RABBITMQ_HOST: rabbitmq
      SERVICE_GATEWAY_URL: http://api-gateway:8082
      SERVICE_AUTH_URL: http://auth-service:8081
      SERVICE_USER_URL: http://user-service:8090
      SERVICE_PROCUREMENT_URL: http://procurement-service:8088
      SERVICE_RFQ_URL: http://rfq-service:8083
      SERVICE_QUOTATION_URL: http://quotation-service:8084
      SERVICE_SUPPLIER_URL: http://supplier-service:8085
      SERVICE_INVOICE_URL: http://invoice-service:8086
      SERVICE_NOTIFICATION_URL: http://notification-service:8087
      SERVICE_OCR_URL: http://ocr-service:8091
      SERVICE_AI_URL: http://ai-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - procureai-network

  api-gateway:
    build:
      context: ../services/api-gateway
    container_name: procureai-gateway
    ports:
      - "8082:8082"
    environment:
      JWT_SECRET: ${JWT_SECRET:-ProcureAI-JWT-Secret-Key-2026-That-Is-At-Least-256-Bits-Long!!}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - auth-service
      - redis
    networks:
      - procureai-network

  user-service:
    build:
      context: ../services/user-service
    container_name: procureai-user
    ports:
      - "8090:8090"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: user_db
      DB_USER: admin
      DB_PASSWORD: ${DB_PASSWORD:-supersecretpassword}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - procureai-network

  procurement-service:
