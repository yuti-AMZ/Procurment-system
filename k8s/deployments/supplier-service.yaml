apiVersion: apps/v1
kind: Deployment
metadata:
  name: supplier-service
  namespace: procureai
  labels:
    app: supplier-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: supplier-service
  template:
    metadata:
      labels:
        app: supplier-service
    spec:
      containers:
        - name: supplier-service
          image: procureai/supplier-service:latest
          ports:
            - containerPort: 8085
          envFrom:
            - configMapRef:
                name: procureai-config
            - secretRef:
                name: procureai-secrets
          env:
            - name: DB_NAME
              value: supplier_db
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
