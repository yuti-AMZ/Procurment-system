apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-service
  namespace: procureai
  labels:
    app: ocr-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ocr-service
  template:
    metadata:
      labels:
        app: ocr-service
    spec:
      containers:
        - name: ocr-service
          image: procureai/ocr-service:latest
          ports:
            - containerPort: 8091
          envFrom:
            - configMapRef:
                name: procureai-config
            - secretRef:
                name: procureai-secrets
          env:
            - name: DB_NAME
              value: ocr_db
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8091
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8091
            initialDelaySeconds: 30
            periodSeconds: 10
