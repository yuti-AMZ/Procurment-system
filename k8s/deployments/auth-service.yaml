apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: procureai
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: procureai/auth-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: procureai-config
            - secretRef:
                name: procureai-secrets
          env:
            - name: DB_NAME
              value: auth_db
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: procureai-config
                  key: JAVA_OPTS
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
