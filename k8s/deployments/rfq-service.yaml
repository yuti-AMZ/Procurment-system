apiVersion: apps/v1
kind: Deployment
metadata:
  name: rfq-service
  namespace: procureai
  labels:
    app: rfq-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rfq-service
  template:
    metadata:
      labels:
        app: rfq-service
    spec:
      containers:
        - name: rfq-service
          image: procureai/rfq-service:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: procureai-config
            - secretRef:
                name: procureai-secrets
          env:
            - name: DB_NAME
              value: rfq_db
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
