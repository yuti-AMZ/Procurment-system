apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: procureai
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: procureai/notification-service:latest
          ports:
            - containerPort: 8087
          envFrom:
            - configMapRef:
                name: procureai-config
            - secretRef:
                name: procureai-secrets
          env:
            - name: DB_NAME
              value: notification_db
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: procureai-secrets
                  key: MAIL_USERNAME
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: procureai-secrets
                  key: MAIL_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8087
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 10
